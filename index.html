<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>재미있는 그림들</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    font-family:"맑은 고딕";
}

body{
    border:10px solid red;      /* 전체 테두리 */
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    background:linear-gradient(skyblue,white);
}

/* 상단 제목 */
#title{
    width:100%;
    height:18%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    font-weight:bold;
    color:blue;
    text-shadow:4px 4px 6px gray;
}

/* 가운데 그림 */
#images{
    width:100%;
    height:62%;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
}

#images img{
    width:280px;
    height:220px;
    border:6px solid navy;
    border-radius:20px;
    box-shadow:8px 8px 12px gray;
}

/* 하단 이름 */
#name{
    width:100%;
    height:20%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    font-weight:bold;
    color:red;
    text-shadow:3px 3px 5px black;
}
</style>

</head>

<body>

<div id="title">
    🎨 재미있는 그림들 🎨
</div>

<div id="images">
    <img src="https://raw.githubusercontent.com/c371717/ax1/main/1.png" alt="그림1">

    <img src="https://raw.githubusercontent.com/c371717/ax1/main/%EC%9E%90%EB%8F%99%EC%B0%A8.png" alt="자동차">

    <img src="https://raw.githubusercontent.com/c371717/ax1/main/3.png" alt="그림3">
</div>

<div id="name">
    최 유 정
</div>

</body>
</html>
